<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Artisan</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-layout {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }
        .cart-items-section {
            flex: 2;
        }
        .cart-summary {
            flex: 1;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            height: fit-content;
        }
        .cart-item {
            display: flex;
            align-items: center;
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .cart-item-img {
            width: 100px;
            height: 100px;
            background-size: cover;
            background-position: center;
            border-radius: 5px;
            margin-right: 20px;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .cart-item-price {
            color: var(--primary-color);
            font-weight: bold;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .remove-btn {
            color: var(--danger-color);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .summary-total {
            font-weight: bold;
            font-size: 1.3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
        }
        @media (max-width: 768px) {
            .cart-layout {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html">Artisan.</a></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
        </nav>
        <div class="nav-actions">
            <a href="cart.html" class="cart-icon"><i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span></a>
            <div id="authLinks">
                <a href="login.html" class="btn btn-outline">Log In</a>
            </div>
            <div id="userMenu" style="display: none;">
                <a href="dashboard.html" class="btn btn-secondary"><i class="fas fa-user"></i> Dashboard</a>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title" style="margin-top: 20px;">Your Cart</h2>
        
        <div class="cart-layout" id="cartLayout">
            <!-- Rendered by JS -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
