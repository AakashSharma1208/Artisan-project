<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Artisan</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-layout {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }
        .sidebar {
            width: 250px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 20px 0;
            height: fit-content;
        }
        .sidebar-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
            font-weight: 500;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background-color: var(--background-color);
            color: var(--secondary-color);
            border-left-color: var(--secondary-color);
        }
        .sidebar-item i {
            width: 25px;
        }
        .dashboard-content {
            flex: 1;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 30px;
            min-height: 500px;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: var(--background-color);
            color: var(--text-light);
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .dashboard-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                display: flex;
                overflow-x: auto;
            }
            .sidebar-item {
                border-left: none;
                border-bottom: 3px solid transparent;
                white-space: nowrap;
            }
            .sidebar-item:hover, .sidebar-item.active {
                border-left-color: transparent;
                border-bottom-color: var(--secondary-color);
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html">Artisan.</a></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
        </nav>
        <div class="nav-actions">
            <a href="cart.html" class="cart-icon"><i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span></a>
            <button id="logoutBtn" class="btn btn-outline">Logout</button>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-layout">
            <aside class="sidebar" id="sidebar">
                <!-- Injected via JS based on role -->
            </aside>
            <section class="dashboard-content" id="dashboardContent">
                <!-- Injected via JS -->
            </section>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
