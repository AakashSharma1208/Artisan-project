<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Artisan</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-layout {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }
        .checkout-form {
            flex: 2;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }
        .checkout-summary {
            flex: 1;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            height: fit-content;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .summary-total {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 768px) {
            .checkout-layout, .form-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html">Artisan.</a></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
        </nav>
        <div class="nav-actions">
            <!-- Simplified nav for checkout -->
            <a href="dashboard.html" class="btn btn-outline" id="dashLink" style="display:none;">Dashboard</a>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title" style="margin-top: 20px;">Checkout</h2>
        
        <div class="checkout-layout">
            <div class="checkout-form">
                <h3>Shipping Information</h3>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Street Address</label>
                        <input type="text" id="street" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group">
                            <label>State/Province</label>
                            <input type="text" id="state" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Zip/Postal Code</label>
                            <input type="text" id="zip" required>
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <input type="text" id="country" required>
                        </div>
                    </div>
                    
                    <h3 style="margin-top: 30px;">Payment Information</h3>
                    <div class="form-group">
                        <label>Name on Card</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="XXXX XXXX XXXX XXXX" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry (MM/YY)</label>
                            <input type="text" placeholder="MM/YY" required>
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <input type="text" placeholder="123" required>
                        </div>
                    </div>

                    <div id="checkoutError" class="error-msg"></div>

                    <button type="submit" class="btn btn-primary btn-block" id="placeOrderBtn" style="margin-top: 20px; font-size: 1.1rem; padding: 15px;">Place Order</button>
                </form>
            </div>
            
            <div class="checkout-summary" id="checkoutSummary">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
